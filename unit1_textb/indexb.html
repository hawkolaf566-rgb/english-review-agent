<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 1 Text B 单词学习机</title><style>
:root{--bg:#f7f2e9;--paper:#fffaf2;--ink:#27231d;--muted:#756a5c;--line:#e2d5c4;--accent:#744923;--accent2:#b47a35;--mark:#ffe27e;--blue:#dff0ff;--green:#dff8e8;--orange:#ffe8c8;--purple:#eee4ff;--pink:#ffe3ec;--gray:#eee8df;--bad:#a84532;--good:#277050}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f8f3ea,#eee4d4);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans SC",sans-serif;color:var(--ink)}.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;overflow:auto;background:rgba(255,250,242,.96);border-right:1px solid var(--line);padding:18px}.main{padding:18px;max-width:1120px}.title{font-size:23px;line-height:1.15;margin:0 0 8px;font-weight:900}.sub{font-size:13px;color:var(--muted);line-height:1.55}.search{width:100%;padding:11px;border:1px solid var(--line);border-radius:13px;background:#fff;margin:14px 0 8px}.tabs{display:flex;gap:6px;margin-bottom:10px}.tab{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px;cursor:pointer}.tab.active,.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;cursor:pointer;font-weight:700;color:var(--ink)}.btn:hover{transform:translateY(-1px)}.btn.small{font-size:12px;padding:7px 9px}.btn.bad{border-color:#dda79a;color:var(--bad)}.btn.good{border-color:#8fcaaa;color:var(--good)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.list{display:flex;flex-direction:column;gap:7px}.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 11px;cursor:pointer}.item.active{outline:2px solid var(--accent2);background:#fff7df}.word{font-size:16px;font-weight:900}.ipa{font-size:12px;color:var(--muted);margin-top:2px}.mean{font-size:12px;color:var(--muted);margin-top:5px}.status{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:2px 6px;color:var(--muted)}.status.known{color:var(--good);background:#f0fbf5;border-color:#a6d2bb}.status.hard{color:var(--bad);background:#fff0ec;border-color:#e0aea3}.itemtop{display:flex;justify-content:space-between;gap:8px}.badge{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 9px;font-size:12px;color:var(--muted);margin:8px 5px 8px 0}.bar{height:9px;background:#eadfce;border-radius:99px;overflow:hidden;margin-bottom:12px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0}.hero,.card{border:1px solid var(--line);background:var(--paper);border-radius:22px;padding:20px;margin-bottom:16px;box-shadow:0 12px 38px rgba(80,50,20,.06)}.big{font-size:42px;font-weight:950;letter-spacing:-.03em}.kicker{font-size:13px;color:var(--muted);font-weight:800}.def{font-size:24px;font-weight:900}.simple{font-size:15px;color:#4f493f;line-height:1.75}.sentence{font-family:Georgia,"Times New Roman",serif;font-size:20px;line-height:1.85;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}.hl{background:var(--mark);border-radius:6px;padding:1px 4px;font-weight:900}.cn{font-size:15px;line-height:1.7;background:#fbf4e8;border-radius:14px;padding:12px;color:#51483c;margin-top:10px}.chunk{display:inline-block;vertical-align:top;border:1px solid var(--line);border-radius:15px;padding:10px 12px;margin:5px 5px 8px 0;line-height:1.65;max-width:100%}.chunk b{display:block;font-size:12px;color:#5b5043;margin-bottom:3px}.chunk small{display:block;color:#6c6257;font-size:12px}.c0{background:var(--blue)}.c1{background:var(--green)}.c2{background:var(--orange)}.c3{background:var(--purple)}.c4{background:var(--pink)}.c5{background:var(--gray)}.foldHead{display:flex;justify-content:space-between;gap:12px;align-items:center;cursor:pointer;user-select:none}.foldHead h3{margin:0}.foldBody{display:none;padding-top:14px}.fold.open .foldBody{display:block}.dictInput{width:100%;font-size:22px;font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:800;margin:12px 0;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.mask{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:34px;font-weight:900;letter-spacing:.08em;text-align:center;border:1px dashed #d1aa68;background:#fff7e4;border-radius:16px;padding:18px;margin:12px 0}.feedback{display:none;border-radius:14px;padding:12px;margin-top:10px;line-height:1.65}.feedback.good{display:block;background:#effaf4;border:1px solid #aad6bd;color:#195c3d}.feedback.bad{display:block;background:#fff2ee;border:1px solid #e2aa9d;color:#7d3528}.feedback.neutral{display:block;background:#f8f3e9;border:1px solid var(--line);color:#5b5145}.tok{cursor:pointer;border-bottom:1px dotted #b68d58;border-radius:3px}.tok:hover{background:#fff0c5}.pop{position:fixed;z-index:99;width:min(310px,calc(100vw - 24px));background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 16px 60px rgba(0,0,0,.22);display:none}.pop h4{margin:0 0 4px;font-size:20px}.toast{position:fixed;right:18px;bottom:18px;background:#2b241c;color:#fff;padding:10px 14px;border-radius:14px;opacity:0;transform:translateY(8px);transition:.2s;z-index:99}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--line)}.main{padding:14px}.big{font-size:34px}.sentence{font-size:18px}}
</style></head><body><div class="app"><aside class="side"><h1 class="title">Unit 1 Text B<br>Chance favors the prepared</h1><div class="sub">单词卡 + 折叠句子结构 + 听写。句子里的单词可以点击查看小词义。</div><div id="stats"></div><div class="bar"><span id="bar"></span></div><input id="search" class="search" placeholder="搜索单词/中文/句子"><div class="tabs"><button class="tab active" data-filter="all">全部</button><button class="tab" data-filter="word">单词</button><button class="tab" data-filter="phrase">短语</button></div><div class="row" style="margin-bottom:10px"><button class="btn small" id="prevBtn">←上一个</button><button class="btn small primary" id="nextBtn">下一个→</button><button class="btn small" id="nextHard">下个不熟</button></div><div class="list" id="list"></div></aside><main class="main"><section class="hero"><div class="kicker" id="loc"></div><div class="big" id="big"></div><div class="ipa" id="ipa"></div><div class="row"><button class="btn primary" id="speakWord">🔊 听单词</button><button class="btn" id="speakWordSlow">🐢 慢速</button><button class="btn" id="speakSent">🔊 听整句</button><button class="btn" data-open="meaning">📌 意思</button><button class="btn" data-open="sentence">📖 句子结构</button><button class="btn primary" data-open="dict">📝 听写</button></div><p class="sub">再次点击“意思/句子结构/听写”会收起。平时只看单词，累了就少展开。</p></section><section class="card fold open" id="fold-meaning"><div class="foldHead"><h3>① 单词意思</h3><span>展开/收起</span></div><div class="foldBody"><div class="def" id="meaning"></div><div class="simple" id="simple"></div><div class="row" style="margin-top:14px"><button class="btn good" id="known">✓ 我记住了</button><button class="btn bad" id="hard">× 还不熟</button><button class="btn" id="clear">清除</button></div></div></section><section class="card fold" id="fold-sentence"><div class="foldHead"><h3>② 课文对应句 + 彩色句子结构</h3><span>展开/收起</span></div><div class="foldBody"><div class="sentence" id="sentence"></div><div class="cn" id="cn"></div><p class="sub">点击英文句子里的任意单词，可以查看小词义和发音。</p><div id="struct"></div></div></section><section class="card fold" id="fold-dict"><div class="foldHead"><h3>③ 听写训练</h3><span>展开/收起</span></div><div class="foldBody"><div class="row"><select id="dictMode" class="btn"><option value="current">当前卡片</option><option value="randomWord" selected>随机单词</option><option value="randomAll">随机全部含短语</option><option value="hard">只抽不熟/未背</option></select><button class="btn primary" id="dictNew">抽一题并播放</button><button class="btn" id="dictPlay">🔊 播放</button><button class="btn" id="dictSlow">🐢 慢速</button><button class="btn" id="dictSent">听课文句</button></div><div class="mask" id="dictMask">_ _ _ _ _</div><input id="dictInput" class="dictInput" spellcheck="false" autocomplete="off" placeholder="听声音后输入英文；回车检查"><div class="row"><button class="btn primary" id="dictCheck">检查拼写</button><button class="btn" id="dictHint">显示首字母/长度</button><button class="btn bad" id="dictReveal">不认识：显示中英文</button><button class="btn" id="dictCopyWrong">复制错题本</button></div><div id="dictFeedback" class="feedback"></div><div id="dictRevealBox" class="card" style="display:none;margin-top:12px"></div></div></section></main></div><div id="pop" class="pop"></div><div class="toast" id="toast"></div><script>
