<html lang="zh-CN">

<title>新视野大学英语3 总复习机</title>
<style>

nt));width:0;transition:.2s}.select,.input{border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:#fff;font-size:15px}.select{min-width:160px}.input{width:100%;font-size:22px;font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:800}.prompt{border:1px dashed #d1aa68;background:#fff7e4;border-radius:18px;padding:18px;margin:14px 0}.promptLabel{font-size:13px;color:var(--muted);font-weight:900;margin-bottom:8px}.big{font-size:42px;font-weight:950;letter-spacing:-.03em}.mask{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:32px;font-weight:900;letter-spacing:.08em;text-align:center}.meaning{font-size:24px;font-weight:900;line-height:1.45}.source{font-size:13px;color:var(--muted);font-weight:800}.sentence{font-family:Georgia,"Times New Roman",serif;font-size:20px;line-height:1.8;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin:10px 0}.cn{font-size:15px;line-height:1.7;background:#fbf4e8;border-radius:14px;padding:12px;color:#51483c}.hl{background:var(--mark);border-radius:6px;padding:1px 4px;font-weight:900}.blank{display:inline-block;min-width:100px;border-bottom:3px solid var(--accent2);color:transparent}.feedback{display:none;border-radius:14px;padding:12px;margin-top:12px;line-height:1.65}.feedback.good{display:block;background:#effaf4;border:1px solid #aad6bd;color:#195c3d}.feedback.bad{display:block;background:#fff2ee;border:1px solid #e2aa9d;color:#7d3528}.feedback.neutral{display:block;background:#f8f3e9;border:1px solid var(--line);color:#5b5145}.answer{display:none;border:1px solid var(--line);background:#fff;border-radius:18px;padding:16px;margin-top:12px}.answer.show{display:block}.chunk{display:inline-block;vertical-align:top;border:1px solid var(--line);border-radius:15px;padding:10px 12px;margin:5px 5px 8px 0;line-height:1.65;max-width:100%}.chunk b{display:block;font-size:12px;color:#5b5043;margin-bottom:3px}.chunk small{display:block;color:#6c6257;font-size:12px}.c0{background:var(--blue)}.c1{background:var(--green)}.c2{background:var(--orange)}.c3{background:var(--purple)}.c4{background:var(--pink)}.c5{background:var(--gray)}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table td{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px;font-size:14px}.table td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px;font-weight:900}.table td:last-child{border-right:1px solid var(--line);border-radius:0 12px 12px 0}.toast{position:fixed;right:18px;bottom:18px;background:#2b241c;color:#fff;padding:10px 14px;border-radius:14px;opacity:0;transform:translateY(8px);transition:.2s;z-index:99}.toast.show{opacity:1;transform:translateY(0)}.hide{display:none!important}@media(max-width:900px){.grid,.unitGrid{grid-template-columns:1fr}.wrap{padding:14px}.big{font-size:34px}.sentence{font-size:18px}}

<body><div class="wrap">
<section class="hero">
  <h1>新视野大学英语3 总复习机</h1>
  <div class="sub">现在已接入 <b>Unit 1 Text A</b> 和 <b>Unit 1 Text B</b>。这里负责“全部单词乱序复习”，单元页面负责“逐词学习 + 句子结构”。</div>
  <div id="stats"></div><div class="bar"><span id="bar"></span></div>
</section>

<section class="card">
  <h2 style="margin-top:0">按单元进入</h2>
  <div class="unitGrid" id="units"></div>
</section>

<section class="card">
  <h2 style="margin-top:0">🔥 全部单词随机复习</h2>
  <div class="row">
    <select id="range" class="select"><option value="all">全部已添加</option><option value="u1a">Unit 1 Text A</option><option value="u1b">Unit 1 Text B</option></select>
    <select id="typeFilter" class="select"><option value="all">单词+短语</option><option value="word">只要单词</option><option value="phrase">只要短语</option></select>
    <select id="statusFilter" class="select"><option value="all">全部状态</option><option value="notKnown">未掌握</option><option value="hard">只抽不熟</option><option value="new">只抽未背</option><option value="wrong">只抽错题</option></select>
    <select id="mode" class="select"><option value="listen">听单词拼写</option><option value="meaning">看中文拼写</option><option value="cloze">课文句填空</option><option value="quick">看英文想中文</option></select>
    <button class="btn primary" id="newQ">抽一题</button>
  </div>

  <div class="prompt" id="promptBox">
    <div class="source" id="source"></div>
    <div class="promptLabel" id="promptLabel"></div>
    <div id="promptContent"></div>
  </div>

  <div class="row" id="playRow">
    <button class="btn primary" id="playWord">🔊 播放单词/短语</button>
    <button class="btn" id="playSlow">🐢 慢速</button>
    <button class="btn" id="playSentence">🔊 播放课文句</button>
    <button class="btn" id="hint">显示首字母/长度</button>
  </div>
  <input id="answerInput" class="input" autocomplete="off" spellcheck="false" placeholder="在这里拼写英文；回车检查">
  <div class="row" style="margin-top:10px">
    <button class="btn primary" id="check">检查</button>
    <button class="btn bad" id="reveal">不认识 / 显示答案</button>
    <button class="btn good" id="known">✓ 标记已会</button>
    <button class="btn bad" id="hard">× 标记不熟</button>
    <button class="btn" id="openUnit">打开这个单元页面</button>
  </div>
  <div id="feedback" class="feedback"></div>
  <div id="answerBox" class="answer"></div>
</section>

<section class="card">
  <h2 style="margin-top:0">错题 / 不熟词</h2>
  <div class="row" style="margin-bottom:10px">
    <button class="btn" id="copyWrong">复制错题本</button>
    <button class="btn" id="exportProgress">导出进度</button>
    <label class="btn" for="importProgress" style="display:inline-block">导入进度</label><input id="importProgress" type="file" accept="application/json" class="hide">
    <button class="btn bad" id="clearReview">只清空总复习记录</button>
  </div>
  <div id="wrongList" class="sub"></div>
</section>
</div><div id="toast" class="toast"></div>

function norm(s){return String(s||'').toLowerCase().replace(/[’']/g,'').replace(/[^a-z0-9]+/g,'').trim()}
function toast(m){$('toast').textContent=m;$('toast').classList.add('show');clearTimeout(window.t);window.t=setTimeout(()=>$('toast').classList.remove('show'),1400)}
function speak(t,r=.86){if(!('speechSynthesis' in window))return toast('浏览器不支持发音');speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(String(t).replace(/[—–]/g,', '));u.lang='en-US';u.rate=r;let vs=speechSynthesis.getVoices();let v=vs.find(x=>/en-US/i.test(x.lang))||vs.find(x=>/^en/i.test(x.lang));if(v)u.voice=v;speechSynthesis.speak(u)}
function hi(text,ms){let out=esc(text);[...(ms||[])].sort((a,b)=>b.length-a.length).forEach(m=>{out=out.replace(new RegExp(reEsc(esc(m)),'gi'),x=>`<span class="hl">${x}</span>`)});return out}
function getStatus(it){return localStorage.getItem('master_st_'+it.id)||localStorage.getItem(it.oldStatusKey)||''}
function setStatus(it,s){if(s){localStorage.setItem('master_st_'+it.id,s);localStorage.setItem(it.oldStatusKey,s)}else{localStorage.removeItem('master_st_'+it.id);localStorage.removeItem(it.oldStatusKey)}renderStats();renderWrong();toast(s?'已保存':'已清除')}
function wrongCount(it){return Number(localStorage.getItem('master_wrong_'+it.id)||localStorage.getItem(it.oldWrongKey)||0)}
function addWrong(it){let n=wrongCount(it)+1;localStorage.setItem('master_wrong_'+it.id,String(n));localStorage.setItem(it.oldWrongKey,String(n));}
function accepts(it){return [it.word,...(it.match||[])].map(norm).filter(Boolean)}
function mask(t,show){let first=true;return String(t).split('').map(ch=>{if(/[A-Za-z0-9]/.test(ch)){let o=show&&first?ch:'_';first=false;return o}first=true;return ch}).join(' ')}
function cloze(it,reveal=false){let sent=esc(it.sentence);let done=false;[...(it.match||[it.word])].sort((a,b)=>b.length-a.length).forEach(m=>{if(done)return;let r=new RegExp(reEsc(esc(m)),'i');if(r.test(sent)){sent=sent.replace(r,reveal?'<span class="hl">$&</span>':'<span class="blank">$&</span>');done=true}});return sent}
function pool(){let r=$('range').value,t=$('typeFilter').value,s=$('statusFilter').value;return ITEMS.filter(it=>{if(r!=='all'&&it.unitId!==r)return false;if(t==='word'&&it.type==='phrase')return false;if(t==='phrase'&&it.type!=='phrase')return false;let st=getStatus(it),wc=wrongCount(it);if(s==='notKnown'&&st==='known')return false;if(s==='hard'&&st!=='hard')return false;if(s==='new'&&st)return false;if(s==='wrong'&&wc<=0)return false;return true})}
function renderUnits(){ $('units').innerHTML=UNITS.map(u=>`<a class="unit ${u.available?'':'off'}" href="${u.url}"><b>${esc(u.label)}</b><span>${esc(u.title)}</span><br><span class="badge">${u.available?u.count+' 个词条':'待添加'}</span></a>`).join('') }
function renderStats(){let total=ITEMS.length,known=ITEMS.filter(x=>getStatus(x)==='known').length,hard=ITEMS.filter(x=>getStatus(x)==='hard').length,wrong=ITEMS.filter(x=>wrongCount(x)>0).length;$('stats').innerHTML=`<span class="badge">总词条 ${total}</span><span class="badge">已会 ${known}</span><span class="badge">不熟 ${hard}</span><span class="badge">错题 ${wrong}</span><span class="badge">当前题池 ${pool().length}</span>`;$('bar').style.width=(known/total*100)+'%'}
function choose(){let p=pool();if(!p.length){toast('这个筛选条件下没有词');return}current=p[Math.floor(Math.random()*p.length)];hintShown=false;renderQuestion();}
function renderQuestion(){if(!current)return;let it=current,mode=$('mode').value;$('source').textContent=`${it.unitLabel} · ${it.textTitle} · ${it.type==='phrase'?'短语':'单词'}`;$('feedback').className='feedback';$('feedback').innerHTML='';$('answerBox').className='answer';$('answerBox').innerHTML='';$('answerInput').value='';$('answerInput').style.display=mode==='quick'?'none':'block';$('hint').style.display=(mode==='quick'||mode==='meaning')?'none':'inline-block';$('promptLabel').textContent={listen:'听声音，拼出英文',meaning:'看中文，拼出英文',cloze:'根据课文句子填空',quick:'看英文，回忆中文'}[mode];
  if(mode==='listen'){$('promptContent').innerHTML=`<div class="mask">${mask(it.word,hintShown)}</div>`;setTimeout(()=>speak(it.word,.82),80)}
  if(mode==='meaning'){$('promptContent').innerHTML=`<div class="meaning">${esc(it.meaning)}</div><div class="sub">${esc(it.simple||'')}</div>`}
  if(mode==='cloze'){$('promptContent').innerHTML=`<div class="sentence">${cloze(it,false)}</div><div class="sub">提示：可以填词条本身，也可以填课文里的变形。</div>`}
  if(mode==='quick'){$('promptContent').innerHTML=`<div class="big">${esc(it.word)}</div><div class="sub">${esc(it.ipa||'')}</div>`}
}
function showAnswer(markHard=false){if(!current)return;let it=current;if(markHard)setStatus(it,'hard');let struct=(it.structure||[]).map((c,i)=>`<span class="chunk c${i%6}"><b>${esc(c.label)}</b>${hi(c.text,it.match)}<small>${esc(c.hint||'')}</small></span>`).join('');$('answerBox').className='answer show';$('answerBox').innerHTML=`<h3 style="margin-top:0">${esc(it.word)} <span class="source">${esc(it.ipa||'')}</span></h3><p><b>中文：</b>${esc(it.meaning)}；${esc(it.simple||'')}</p><div class="sentence">${hi(it.sentence,it.match)}</div><div class="cn">${esc(it.cn||'')}</div><h4>句子结构</h4><div>${struct||'<span class="sub">暂无结构拆分</span>'}</div>`}
function check(){if(!current)return;let it=current,mode=$('mode').value,ans=norm($('answerInput').value);let fb=$('feedback');if(mode==='quick'){showAnswer(false);return}if(!ans){fb.className='feedback neutral';fb.innerHTML='先输入英文；不会就点“不认识 / 显示答案”。';return}let ok=accepts(it).includes(ans);if(ok){setStatus(it,'known');fb.className='feedback good';fb.innerHTML=`答对了：<b>${esc(it.word)}</b> = ${esc(it.meaning)}`;showAnswer(false)}else{setStatus(it,'hard');addWrong(it);fb.className='feedback bad';fb.innerHTML=`没拼对。你写的是：<b>${esc($('answerInput').value)}</b>。可以再听一遍，或者显示答案。`;renderWrong();}}
function renderWrong(){let arr=ITEMS.filter(it=>getStatus(it)==='hard'||wrongCount(it)>0);$('wrongList').innerHTML=arr.length?`<table class="table"><tbody>${arr.slice(0,30).map(it=>`<tr><td>${esc(it.word)}</td><td>${esc(it.meaning)}</td><td>${esc(it.unitLabel)}</td><td>错 ${wrongCount(it)} 次 / ${getStatus(it)||'未背'}</td></tr>`).join('')}</tbody></table>${arr.length>30?'<div class="sub">只显示前30个。</div>':''}`:'目前还没有不熟词/错题。'}
function copyWrong(){let arr=ITEMS.filter(it=>getStatus(it)==='hard'||wrongCount(it)>0);if(!arr.length)return toast('目前没有错题');let text=arr.map(it=>`[${it.unitLabel}] ${it.word} ${it.ipa||''} - ${it.meaning}\n${it.sentence}\n${it.cn||''}`).join('\n\n');navigator.clipboard.writeText(text).then(()=>toast('已复制错题本'),()=>toast('复制失败'))}
function exportProgress(){let obj={version:1,exportedAt:new Date().toISOString(),items:ITEMS.map(it=>({id:it.id,word:it.word,status:getStatus(it),wrong:wrongCount(it)}))};let blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='english_review_progress.json';a.click();URL.revokeObjectURL(a.href)}
function importProgress(file){let r=new FileReader();r.onload=()=>{try{let obj=JSON.parse(r.result);(obj.items||[]).forEach(x=>{let it=ITEMS.find(i=>i.id===x.id);if(!it)return;if(x.status)setStatus(it,x.status);if(x.wrong)localStorage.setItem('master_wrong_'+it.id,String(x.wrong));});renderStats();renderWrong();toast('进度已导入')}catch(e){toast('导入失败')}};r.readAsText(file)}
function clearReview(){if(!confirm('只清空总复习页自己的记录？单元页旧记录尽量保留。'))return;ITEMS.forEach(it=>{localStorage.removeItem('master_st_'+it.id);localStorage.removeItem('master_wrong_'+it.id)});renderStats();renderWrong();toast('已清空总复习记录')}
$('newQ').onclick=choose;$('check').onclick=check;$('reveal').onclick=()=>showAnswer(true);$('known').onclick=()=>current&&setStatus(current,'known');$('hard').onclick=()=>current&&setStatus(current,'hard');$('playWord').onclick=()=>current&&speak(current.word,.82);$('playSlow').onclick=()=>current&&speak(current.word,.58);$('playSentence').onclick=()=>current&&speak(current.sentence,.78);$('hint').onclick=()=>{hintShown=!hintShown;renderQuestion()};$('answerInput').addEventListener('keydown',e=>{if(e.key==='Enter')check()});['range','typeFilter','statusFilter','mode'].forEach(id=>$(id).onchange=()=>{renderStats();choose()});$('openUnit').onclick=()=>{if(current)location.href=current.page};$('copyWrong').onclick=copyWrong;$('exportProgress').onclick=exportProgress;$('importProgress').onchange=e=>{if(e.target.files[0])importProgress(e.target.files[0])};$('clearReview').onclick=clearReview;speechSynthesis&&speechSynthesis.getVoices();renderUnits();renderStats();renderWrong();choose();
</script></body></html>
