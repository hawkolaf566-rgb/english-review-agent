<title>Unit 1 折叠式单词学习机·可点词意</title>
<style>
:root{--bg:#f7f2e9;--paper:#fffaf2;--ink:#27231d;--muted:#756a5c;--line:#e2d5c4;--accent:#744923;--accent2:#b47a35;--mark:#ffe27e;--blue:#dff0ff;--green:#dff8e8;--orange:#ffe8c8;--purple:#eee4ff;--pink:#ffe3ec;--gray:#eee8df;--bad:#a84532;--good:#277050}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f8f3ea,#eee4d4);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans SC",sans-serif;color:var(--ink)}
.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;overflow:auto;background:rgba(255,250,242,.96);border-right:1px solid var(--line);padding:18px}.main{padding:24px;max-width:1120px}.title{font-size:23px;line-height:1.15;margin:0 0 8px;font-weight:900}.sub{font-size:13px;color:var(--muted);line-height:1.55}.search{width:100%;padding:11px;border:1px solid var(--line);border-radius:13px;background:#fff;margin:14px 0 8px}.tabs{display:flex;gap:6px;margin-bottom:10px}.tab{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px;cursor:pointer}.tab.active,.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;cursor:pointer;font-weight:700;color:var(--ink);transition:.12s}.btn:hover{transform:translateY(-1px)}.btn.small{font-size:12px;padding:7px 9px}.btn.bad{border-color:#dda79a;color:var(--bad)}.btn.good{border-color:#8fcaaa;color:var(--good)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.list{display:flex;flex-direction:column;gap:7px}.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 11px;cursor:pointer}.item.active{outline:2px solid var(--accent2);background:#fff7df}.word{font-size:16px;font-weight:900}.ipa{font-size:12px;color:var(--muted);margin-top:2px}.mean{font-size:12px;color:var(--muted);margin-top:5px}.status{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:2px 6px;color:var(--muted)}.status.known{color:var(--good);background:#f0fbf5;border-color:#a6d2bb}.status.hard{color:var(--bad);background:#fff0ec;border-color:#e0aea3}.itemtop{display:flex;justify-content:space-between;gap:8px}.badge{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 9px;font-size:12px;color:var(--muted);margin:8px 5px 8px 0}.bar{height:9px;background:#eadfce;border-radius:99px;overflow:hidden;margin-bottom:12px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0}.hero,.panel,.memory{border:1px solid var(--line);background:var(--paper);border-radius:22px;padding:20px;margin-bottom:16px;box-shadow:0 12px 38px rgba(80,50,20,.06)}.big{font-size:46px;font-weight:950;letter-spacing:-.03em;line-height:1.05}.kicker{font-size:13px;color:var(--muted);font-weight:800}.topActions{margin-top:12px}.quickHint{font-size:13px;color:var(--muted);line-height:1.6;margin-top:10px}.memory{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 18px}.memory b{font-size:15px}.details{border:1px solid var(--line);background:#fffaf2;border-radius:22px;margin-bottom:14px;overflow:hidden;box-shadow:0 10px 30px rgba(80,50,20,.05)}.details summary{list-style:none;cursor:pointer;padding:18px 20px;font-weight:900;font-size:20px;display:flex;align-items:center;justify-content:space-between;gap:12px}.details summary::-webkit-details-marker{display:none}.details summary:after{content:'展开';font-size:12px;color:var(--muted);font-weight:800;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#fff}.details[open] summary:after{content:'收起'}.detailsBody{padding:0 20px 20px}.def{font-size:24px;font-weight:900;margin-bottom:6px}.simple{font-size:16px;color:#4f493f;line-height:1.75}.sentence{font-family:Georgia,"Times New Roman",serif;font-size:20px;line-height:1.85;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px}.hl{background:var(--mark);border-radius:6px;padding:1px 4px;font-weight:900}.cn{font-size:15px;line-height:1.7;background:#fbf4e8;border-radius:14px;padding:12px;color:#51483c;margin-bottom:14px}.structLegend{font-size:13px;color:var(--muted);margin:6px 0 10px}.chunk{display:inline-block;vertical-align:top;border:1px solid var(--line);border-radius:15px;padding:10px 12px;margin:5px 5px 8px 0;line-height:1.65;max-width:100%}.chunk b{display:block;font-size:12px;color:#5b5043;margin-bottom:3px}.chunk small{display:block;color:#6c6257;font-size:12px}.c0{background:var(--blue)}.c1{background:var(--green)}.c2{background:var(--orange)}.c3{background:var(--purple)}.c4{background:var(--pink)}.c5{background:var(--gray)}.select,.dictInput{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.dictInput{width:100%;font-size:22px;font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:800;margin:12px 0}.mask{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:34px;font-weight:900;letter-spacing:.08em;text-align:center;border:1px dashed #d1aa68;background:#fff7e4;border-radius:16px;padding:18px;margin:12px 0}.feedback{display:none;border-radius:14px;padding:12px;margin-top:10px;line-height:1.65}.feedback.good{display:block;background:#effaf4;border:1px solid #aad6bd;color:#195c3d}.feedback.bad{display:block;background:#fff2ee;border:1px solid #e2aa9d;color:#7d3528}.feedback.neutral{display:block;background:#f8f3e9;border:1px solid var(--line);color:#5b5145}.revealBox{display:none;margin-top:12px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px}.toast{position:fixed;right:18px;bottom:18px;background:#2b241c;color:#fff;padding:10px 14px;border-radius:14px;opacity:0;transform:translateY(8px);transition:.2s;z-index:99}.toast.show{opacity:1;transform:translateY(0)}
.clickWord{cursor:pointer;border-bottom:1px dotted #b47a35;border-radius:4px;padding:0 1px;transition:.12s}.clickWord:hover{background:#fff2c8}.clickWord.hl{background:var(--mark);border-bottom:2px solid #b47a35;font-weight:900}.wordTip{position:fixed;z-index:100;background:#fffaf2;border:1px solid var(--line);box-shadow:0 18px 50px rgba(55,35,15,.22);border-radius:16px;padding:13px 14px;width:min(330px,calc(100vw - 28px));display:none}.wordTip.show{display:block}.wordTip h4{margin:0 0 5px;font-size:20px}.wordTip .tipMean{font-size:15px;line-height:1.6}.wordTip .tipMeta{font-size:12px;color:var(--muted);line-height:1.5;margin-top:6px}.wordTip .tipActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.miniBtn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:800}.sentenceNote{font-size:13px;color:var(--muted);line-height:1.6;margin:-4px 0 10px}.clickHelp{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:999px;padding:3px 8px;font-size:12px;color:var(--muted);margin-left:8px}

@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--line)}.main{padding:16px}.big{font-size:36px}.sentence{font-size:18px}.memory{display:block}.memory .row{margin-top:10px}.details summary{font-size:18px}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <h1 class="title">Unit 1<br>折叠式学习机</h1>
    <div class="sub">主页面只保留单词、发音和状态。中文意思、句子结构、听写训练都改成展开/收起，不再用弹窗。</div>
    <div id="stats"></div><div class="bar"><span id="bar"></span></div>
    <input id="search" class="search" placeholder="搜索单词/中文/句子">
    <div class="tabs"><button class="tab active" data-filter="all">全部</button><button class="tab" data-filter="word">单词</button><button class="tab" data-filter="phrase">短语</button></div>
    <div class="row" style="margin-bottom:10px"><button class="btn small" id="prevBtn">← 上一个</button><button class="btn small primary" id="nextBtn">下一个 →</button><button class="btn small" id="nextHard">下个不熟</button></div>
    <div class="list" id="list"></div>
  </aside>
  <main class="main">
    <section class="hero">
      <div class="kicker" id="loc"></div>
      <div class="big" id="big"></div>
      <div class="ipa" id="ipa"></div>
      <div class="row topActions">
        <button class="btn primary" id="speakWord">🔊 听单词</button>
        <button class="btn" id="speakWordSlow">🐢 慢速</button>
        <button class="btn" id="speakSent">🔊 听整句</button>
        <button class="btn" id="jumpMeaning">📌 意思</button>
        <button class="btn" id="jumpSentence">📖 句子结构</button>
        <button class="btn primary" id="jumpDict">📝 听写</button>
      </div>
      <div class="quickHint">点“意思/句子结构/听写”可以展开；再次点击会收起。展开句子后，句子里的每个英文单词都可以点一下看词意。</div>
    </section>

    <section class="memory">
      <div><b>记忆状态</b><div class="sub">会了就标记；不会的之后用“下个不熟”快速复习。</div></div>
      <div class="row"><button class="btn good" id="known">✓ 我记住了</button><button class="btn bad" id="hard">× 还不熟</button><button class="btn" id="clear">清除</button></div>
    </section>

    <details class="details" id="meaningDetails" open>
      <summary>① 单词意思</summary>
      <div class="detailsBody"><div class="def" id="meaning"></div><div class="simple" id="simple"></div></div>
    </details>

    <details class="details" id="sentenceDetails">
      <summary>② 课文对应句 + 彩色句子结构</summary>
      <div class="detailsBody">
        <div class="sentence" id="sentence"></div>
        <div class="sentenceNote">句子里的英文单词都可以点一下看词意；本单元重点词会显示更完整解释。</div>
        <div class="cn" id="cn"></div>
        <div class="structLegend">颜色不是语法考试标准答案，是为了帮你先看懂骨架：背景/主语/谓语/宾语/从句/补充会被拆开。</div>
        <div id="struct"></div>
      </div>
    </details>

    <details class="details" id="dictDetails">
      <summary>③ 听写训练</summary>
      <div class="detailsBody">
        <p class="sub">抽题后先听声音，再输入拼写；不会就点“不认识：显示中英文”。</p>
        <div class="row">
          <select id="dictMode" class="select"><option value="current">当前卡片</option><option value="randomWord" selected>随机单词</option><option value="randomAll">随机全部含短语</option><option value="hard">只抽不熟/未背</option></select>
          <button class="btn primary" id="dictNew">抽一题并播放</button><button class="btn" id="dictPlay">🔊 播放</button><button class="btn" id="dictSlow">🐢 慢速</button><button class="btn" id="dictSent">听课文句</button>
        </div>
        <div class="mask" id="dictMask">_ _ _ _ _</div>
        <input id="dictInput" class="dictInput" spellcheck="false" autocomplete="off" placeholder="在这里输入听到的英文，回车检查">
        <div class="row"><button class="btn primary" id="dictCheck">检查拼写</button><button class="btn" id="dictHint">显示首字母/长度</button><button class="btn bad" id="dictReveal">不认识：显示中英文</button><button class="btn" id="dictCopyWrong">复制错题本</button></div>
        <div id="dictFeedback" class="feedback"></div>
        <div id="dictRevealBox" class="revealBox"></div>
      </div>
    </details>
  </main>
</div>
<div class="wordTip" id="wordTip"></div>
<div class="toast" id="toast"></div>
<script>
const DATA={"items": [{"word": "deviate", "ipa": "/ˈdiːvieɪt/", "type": "v.", "meaning": "偏离；背离；违背", "simple": "deviating from rules", "sentence": "He was not a good student, and had he not been from a famous family, he probably would have been removed from the school for deviating from the rules.", "cn": "他不是个好学生，如果不是出身名门，他很可能因为违反校规而被学校开除。", "match": ["deviating", "deviate"], "para": 1, "structure": [{"label": "主句1", "text": "He was not a good student", "hint": "他不是好学生"}, {"label": "虚拟条件", "text": "had he not been from a famous family", "hint": "如果他不是出身名门"}, {"label": "主句2/结果", "text": "he probably would have been removed from the school", "hint": "他可能会被学校开除"}, {"label": "原因", "text": "for deviating from the rules", "hint": "因为违反规则"}]}, {"word": "preclude", "ipa": "/prɪˈkluːd/", "type": "v.", "meaning": "阻止；妨碍；使不可能", "simple": "prevent; make impossible", "sentence": "Thankfully, he did finish at Harrow and his errors there did not preclude him from going on to the university.", "cn": "幸好，他确实从哈罗毕业了，他在那里的错误并没有阻止他继续上大学。", "match": ["preclude"], "para": 1, "structure": [{"label": "评价", "text": "Thankfully", "hint": "幸好"}, {"label": "主语+谓语1", "text": "he did finish at Harrow", "hint": "他确实从哈罗毕业"}, {"label": "并列主句", "text": "his errors there did not preclude him", "hint": "他的错误没有阻止他"}, {"label": "补足语", "text": "from going on to the university", "hint": "继续上大学"}]}, {"word": "premier", "ipa": "/ˈpremiər/", "type": "adj./n.", "meaning": "最好的；最重要的；首相/总理", "simple": "top; prime minister", "sentence": "He eventually had a premier army career whereby he was later elected prime minister.", "cn": "他后来拥有卓越的军旅生涯，并凭此最终当选为首相。", "match": ["premier"], "para": 1, "structure": [{"label": "主句", "text": "He eventually had a premier army career", "hint": "他最终拥有卓越军旅生涯"}, {"label": "关系/方式", "text": "whereby he was later elected prime minister", "hint": "凭此后来当选首相"}]}, {"word": "whereby", "ipa": "/werˈbaɪ/", "type": "adv.", "meaning": "凭借；借以；通过……方式", "simple": "by which", "sentence": "He eventually had a premier army career whereby he was later elected prime minister.", "cn": "他后来拥有卓越的军旅生涯，并凭此最终当选为首相。", "match": ["whereby"], "para": 1, "structure": [{"label": "主句", "text": "He eventually had a premier army career", "hint": "他最终拥有卓越军旅生涯"}, {"label": "关系/方式", "text": "whereby he was later elected prime minister", "hint": "凭此后来当选首相"}]}, {"word": "civic", "ipa": "/ˈsɪvɪk/", "type": "adj.", "meaning": "公民的；城市的", "simple": "about citizens/city", "sentence": "He achieved fame for his wit, wisdom, civic duty, and abundant courage in his refusal to surrender during the miserable dark days of World War II.", "cn": "他因机智、智慧、公民责任感和非凡勇气而闻名。", "match": ["civic"], "para": 1, "structure": [{"label": "主语+谓语", "text": "He achieved fame", "hint": "他成名"}, {"label": "原因1", "text": "for his wit, wisdom, civic duty, and abundant courage", "hint": "因为机智、智慧、公民责任和勇气"}, {"label": "原因2", "text": "in his refusal to surrender", "hint": "在拒绝投降中"}, {"label": "时间", "text": "during the miserable dark days of World War II", "hint": "二战黑暗时期"}]}, {"word": "patriotic", "ipa": "/ˌpeɪtriˈɑːtɪk/", "type": "adj.", "meaning": "爱国的", "simple": "loving your country", "sentence": "Toward the end of his period as prime minister, he was invited to address the patriotic young boys at his old school, Harrow.", "cn": "在首相任期后期，他受邀回母校哈罗向爱国的男孩们讲话。", "match": ["patriotic"], "para": 2, "structure": [{"label": "时间", "text": "Toward the end of his period as prime minister", "hint": "在首相任期末"}, {"label": "主语+谓语", "text": "he was invited to address", "hint": "他受邀讲话"}, {"label": "对象", "text": "the patriotic young boys", "hint": "爱国的男孩们"}, {"label": "地点", "text": "at his old school, Harrow", "hint": "在母校哈罗"}]}, {"word": "clear-cut", "ipa": "/ˌklɪr ˈkʌt/", "type": "adj.", "meaning": "明确的；清楚的", "simple": "very clear", "sentence": "Sir Winston stood up, all five feet, five inches and 107 kilos of him, and gave this short, clear-cut speech: \"Young men, never give up.\"", "cn": "温斯顿爵士站起来，发表了简短明确的演讲：“年轻人，永不放弃。”", "match": oung boys at his old school, Harrow. The headmaster said, \"Young gentlemen, the greatest speaker of our time, will be here in a few days to address you, and you should obey whatever sound advice he may give you.\" The great day arrived. Sir Winston stood up, all five feet, five inches and 107 kilos of him, and gave this short, clear-cut speech: \"Young men, never give up. Never give up! Never give up! Never, never, never, never!\"", "Personal history, educational opportunity, individual dilemmas — none of these can inhibit a strong spirit committed to success. No task is too hard. No amount of preparation is too long or too difficult. Take the example of two of the most scholarly scientists of our age, Albert Einstein and Thomas Edison. Both faced immense obstacles and extreme criticism. Both were called \"slow to learn\" and written off as idiots by their teachers. Thomas Edison ran away from school because his teacher whipped him repeatedly for asking too many questions. Einstein didn't speak fluently until he was almost nine years old and was such a poor student that some thought he was unable to learn. Yet both boys' parents believed in them. They worked intensely each day with their sons, and the boys learned to never bypass the long hours of hard work that they needed to succeed. In the end, both Einstein and Edison overcame their childhood persecution and went on to achieve magnificent discoveries that benefit the entire world today.", "Consider also the heroic example of Abraham Lincoln, who faced substantial hardships, failures and repeated misfortunes in his lifetime. His background was certainly not glamorous. He was raised in a very poor family with only one year of formal education. He failed in business twice, suffered a nervous breakdown when his first love died suddenly and lost eight political elections. Later in life, he suffered profound grief over the tragic death of three of his four children. Yet his strong will was the spur that pushed him forward, strengthening his optimism, dedication and determination. It intensified and focused his efforts and enabled him to triumph over the overwhelming failures and profound difficulties in his life. A hundred years later, people from around the world commend Abraham Lincoln as the greatest American president of all time.", "Just like Churchill and Lincoln, only those who \"keep their eyes on the prize\", those who uphold a committed and focused will and spirit, will find their endeavors successful. Many artists, statesmen, writers and inventors have had the same experience. They achieved prosperity because they possessed a fierce will to keep preparing and working and a passion to succeed. They attained success, not because it was easy, but because they had the will to overcome profound obstacles and to work diligently in the pursuit of their goals.", "After growing up on a cattle ranch without running water or electricity, Sandra Day O'Connor fought to achieve the best education possible. Consistently graduating at the top of her class, she worked her way into Stanford Law School, where she graduated with honors. But despite all of her hard work, Sandra Day O'Connor was still a woman in the 1950s. Even with the prestige of her degree from Stanford, she was rejected from the entire law circuit as firms preferred to hire less qualified men rather than risk hiring a female lawyer, which was unprecedented. Yet Sandra Day O'Connor refused to give up on her dreams. Through sheer persistence she was eventually nominated and then appointed the first woman Supreme Court Justice of the United States of America. There, she acted as a crucial vote on issues like abortion and women's rights.", "Many people simply say that they want something, but they do not expend the substantial effort required to achieve it. Many people let the threat of failure stop them from trying with all of their heart. The secret of success is based upon a burning inward desire — a robust, fierce will and focus — that fuels the determination to act, to keep preparing, to keep going even when we are tired and fail. As a wise saying goes: \"It's not how many times you fall down that matters. It's how many times you get back up that makes success!\"", "Focus on becoming more knowledgeable. Focus on gradual, consistent progress. Maintain the strong will to keep going — even when you are tired and want to slack or the odds seem too large. \"Keep your eyes on the prize!\" \"Where there's a will, there's a way!\" With hard work, determination, dedication and preparation, you can transcend any handicap, accomplish any feat, and achieve success!"]};

function newDict(){let p=pool();dictIdx=ITEMS.indexOf(p[Math.floor(Math.random()*p.length)]||ITEMS[selected]);dictHint=false;renderDict(true);setTimeout(()=>speak(getD().word,.82),50)}
function norm(s){return String(s||'').toLowerCase().replace(/[’']/g,'').replace(/[^a-z0-9]+/g,'').trim()}
function accepts(it){return [it.word,...(it.match||[])].map(norm).filter(Boolean)}
function checkD(){let it=getD(),a=norm($('dictInput').value),ok=accepts(it).includes(a),fb=$('dictFeedback');if(!a){fb.className='feedback neutral';fb.innerHTML='先输入拼写，或点“不认识”。';return}if(ok){localStorage.setItem('u1st_'+it.word,'known');fb.className='feedback good';fb.innerHTML=`答对了：<b>${esc(it.word)}</b> = ${esc(it.meaning)}<br>${hi(it.sentence,it.match)}`}else{localStorage.setItem('u1st_'+it.word,'hard');localStorage.setItem('u1wrong_'+it.word,String(Number(localStorage.getItem('u1wrong_'+it.word)||0)+1));fb.className='feedback bad';fb.innerHTML=`没拼对。你写的是：<b>${esc($('dictInput').value)}</b>。再听一遍，或者点“不认识”。`}renderStats();renderList()}
function revealD(){let it=getD();localStorage.setItem('u1st_'+it.word,'hard');$('dictRevealBox').style.display='block';$('dictRevealBox').innerHTML=`<h3>${esc(it.word)} <span class="ipa">${esc(it.ipa||'')}</span></h3><p><b>中文：</b>${esc(it.meaning)}；${esc(it.simple)}</p><p><b>句子：</b>${hi(it.sentence,it.match)}</p><p><b>翻译：</b>${esc(it.cn)}</p>`;renderStats();renderList()}
function copyWrong(){let arr=ITEMS.filter(it=>status(it.word)==='hard'||Number(localStorage.getItem('u1wrong_'+it.word)||0)>0);if(!arr.length)return toast('目前没有错题');let text=arr.map(it=>`${it.word} ${it.ipa||''} - ${it.meaning}\n${it.sentence}\n${it.cn}`).join('\n\n');navigator.clipboard.writeText(text).then(()=>toast('已复制错题本'),()=>toast('复制失败'))}
$('dictNew').onclick=newDict;$('dictPlay').onclick=()=>speak(getD().word,.82);$('dictSlow').onclick=()=>speak(getD().word,.58);$('dictSent').onclick=()=>speak(getD().sentence,.78);$('dictCheck').onclick=checkD;$('dictReveal').onclick=revealD;$('dictHint').onclick=()=>{dictHint=!dictHint;$('dictMask').textContent=mask(getD().word,dictHint)};$('dictCopyWrong').onclick=copyWrong;$('dictInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkD()});$('dictMode').addEventListener('change',()=>{if($('dictMode').value==='current'){dictIdx=selected;renderDict(true)}});
if('speechSynthesis' in window) speechSynthesis.getVoices();updateAll();renderDict(false);
</script>
</body>
